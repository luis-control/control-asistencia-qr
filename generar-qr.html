<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generador de QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
    h1 { color: #e94560; text-align: center; margin-bottom: 20px; font-size: 1.4rem; }
    .form-box { max-width: 500px; margin: 0 auto 30px; background: #16213e; padding: 20px; border-radius: 12px; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-bottom: 10px; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #fff; }
    #qr-output { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
    .qr-card { background: #fff; padding: 16px; border-radius: 10px; text-align: center; }
    .qr-card p { font-size: 0.75rem; color: #000; margin-top: 8px; font-weight: bold; max-width: 160px; word-break: break-all; }
    .qr-label { font-size: 1rem; color: #000; font-weight: bold; margin-bottom: 8px; }
  </style>
</head>
<body>
<h1>Generador de QR para Asistencia</h1>
<div class="form-box">
  <button class="btn btn-primary" onclick="generarQRs()">Generar QR Entrada y Salida</button>
  <button class="btn btn-secondary" onclick="window.print()">Imprimir QRs</button>
</div>
<div id="qr-output"></div>
<script>
function generarQRs() {
  const urls = [
    { label: "ENTRADA", url: "https://luis-control.github.io/control-asistencia-qr/Registro%20de%20Entrada.html" },
    { label: "SALIDA", url: "https://luis-control.github.io/control-asistencia-qr/Registro%20de%20Salida.html" }
  ];
  const output = document.getElementById('qr-output');
  output.innerHTML = '';
  urls.forEach(item => {
    const card = document.createElement('div');
    card.className = 'qr-card';
    const lbl = document.createElement('p');
    lbl.className = 'qr-label';
    lbl.textContent = item.label;
    card.appendChild(lbl);
    const qrDiv = document.createElement('div');
    card.appendChild(qrDiv);
    const urlp = document.createElement('p');
    urlp.textContent = item.label;
    card.appendChild(urlp);
    output.appendChild(card);
    new QRCode(qrDiv, { text: item.url, width: 200, height: 200 });
  });
}
generarQRs();
</script>
</body>
</html>
