<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Administrador</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
    header { background: #16213e; padding: 16px; text-align: center; border-bottom: 2px solid #0f3460; }
    header h1 { font-size: 1.4rem; color: #e94560; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    .cards { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .card { flex: 1; min-width: 130px; background: #16213e; border-radius: 10px; padding: 16px; text-align: center; border-top: 3px solid #e94560; }
    .card h2 { font-size: 2rem; color: #e94560; }
    .card p { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .filters input, .filters select { flex: 1; min-width: 140px; padding: 10px; border-radius: 8px; border: 1px solid #0f3460; background: #16213e; color: #fff; font-size: 0.9rem; }
    .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-export { background: #0f3460; color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: #0f3460; padding: 10px 8px; text-align: left; }
    td { padding: 9px 8px; border-bottom: 1px solid #0f3460; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
    .entrada { background: #0d4f3c; color: #00c49a; }
    .salida { background: #4f1a0d; color: #e94560; }
    #loading { text-align: center; padding: 30px; color: #aaa; }
    .map-link { color: #4fc3f7; font-size: 0.75rem; text-decoration: none; }
  </style>
</head>
<body>
<header><h1>Panel Administrador</h1></header>
<div class="container">
  <div class="cards">
    <div class="card"><h2 id="total-hoy">-</h2><p>Registros hoy</p></div>
    <div class="card"><h2 id="total-entradas">-</h2><p>Entradas hoy</p></div>
    <div class="card"><h2 id="total-salidas">-</h2><p>Salidas hoy</p></div>
    <div class="card"><h2 id="total-personas">-</h2><p>Personas unicas</p></div>
  </div>
  <div class="filters">
    <input type="date" id="filtro-fecha"/>
    <select id="filtro-tipo">
      <option value="">Todos</option>
      <option value="entrada">Entrada</option>
      <option value="salida">Salida</option>
    </select>
    <input type="text" id="filtro-nombre" placeholder="Buscar por nombre..."/>
    <button class="btn btn-primary" onclick="cargarDatos()">Filtrar</button>
  </div>
  <button class="btn btn-export" onclick="exportarCSV()">Exportar CSV</button>
  <div id="loading">Cargando datos...</div>
  <table id="tabla" style="display:none;">
    <thead><tr><th>Nombre</th><th>Tipo</th><th>Hora</th><th>Fecha</th><th>Ubicacion</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, orderBy, Timestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDHbW-E4T9X4oDYDMB5aqUjn-FHIPXTi54",
    authDomain: "control-asistencia-5a248.firebaseapp.com",
    projectId: "control-asistencia-5a248",
    storageBucket: "control-asistencia-5a248.firebasestorage.app",
    messagingSenderId: "220664180281",
    appId: "1:220664180281:web:37820f1b3e0259883f67e8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let todosLosDatos = [];
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('filtro-fecha').value = hoy;
  window.cargarDatos = async function() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('tabla').style.display = 'none';
    const fechaVal = document.getElementById('filtro-fecha').value;
    const tipoVal = document.getElementById('filtro-tipo').value;
    const nombreVal = document.getElementById('filtro-nombre').value.trim().toLowerCase();
    let inicio = new Date(fechaVal + 'T00:00:00');
    let fin = new Date(fechaVal + 'T23:59:59');
    const q = query(collection(db, 'asistencia'),
      where('fecha', '>=', Timestamp.fromDate(inicio)),
      where('fecha', '<=', Timestamp.fromDate(fin)),
      orderBy('fecha', 'desc'));
    const snap = await getDocs(q);
    todosLosDatos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    let filtrados = todosLosDatos;
    if (tipoVal) filtrados = filtrados.filter(r => r.tipo === tipoVal);
    if (nombreVal) filtrados = filtrados.filter(r => r.nombre?.toLowerCase().includes(nombreVal));
    const entradas = filtrados.filter(r => r.tipo === 'entrada').length;
    const salidas = filtrados.filter(r => r.tipo === 'salida').length;
    const personas = new Set(filtrados.map(r => r.nombre)).size;
    document.getElementById('total-hoy').textContent = filtrados.length;
    document.getElementById('total-entradas').textContent = entradas;
    document.getElementById('total-salidas').textContent = salidas;
    document.getElementById('total-personas').textContent = personas;
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    filtrados.forEach(r => {
      const fecha = r.fecha?.toDate ? r.fecha.toDate() : new Date();
      const tr = document.createElement('tr');
      const mapUrl = r.latitud ? 'https://maps.google.com/?q=' + r.latitud + ',' + r.longitud : null;
      tr.innerHTML = '<td>' + (r.nombre||'-') + '</td><td><span class="badge ' + r.tipo + '">' + (r.tipo||'').toUpperCase() + '</span></td><td>' + (r.hora||fecha.toLocaleTimeString('es-MX')) + '</td><td>' + fecha.toLocaleDateString('es-MX') + '</td><td>' + (mapUrl ? '<a class="map-link" href="' + mapUrl + '" target="_blank">Ver mapa</a>' : 'Sin ubicacion') + '</td>';
      tbody.appendChild(tr);
    });
    document.getElementById('loading').style.display = 'none';
    document.getElementById('tabla').style.display = 'table';
  };
  window.exportarCSV = function() {
    if (!todosLosDatos.length) { alert('No hay datos'); return; }
    let csv = 'Nombre,Tipo,Hora,Fecha,Latitud,Longitud\n';
    todosLosDatos.forEach(r => {
      const fecha = r.fecha?.toDate ? r.fecha.toDate() : new Date();
      csv += '"' + r.nombre + '","' + r.tipo + '","' + (r.hora||'') + '","' + fecha.toLocaleDateString('es-MX') + '","' + (r.latitud||'') + '","' + (r.longitud||'') + '"\n';
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'asistencia-' + document.getElementById('filtro-fecha').value + '.csv';
    a.click();
  };
  cargarDatos();
</script>
</body>
</html>
