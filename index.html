<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control de Asistencia QR</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
    header { background: #16213e; padding: 16px; text-align: center; border-bottom: 2px solid #0f3460; }
    header h1 { font-size: 1.4rem; color: #e94560; }
    header p { font-size: 0.85rem; color: #aaa; margin-top: 4px; }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #0f3460; }
    .status-box { margin: 16px 0; padding: 14px; border-radius: 10px; text-align: center; font-size: 1rem; display: none; }
    .status-box.success { background: #0d4f3c; border: 1px solid #00c49a; color: #00c49a; display: block; }
    .status-box.error { background: #4f0d0d; border: 1px solid #e94560; color: #e94560; display: block; }
    .status-box.info { background: #0d2a4f; border: 1px solid #4fc3f7; color: #4fc3f7; display: block; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-top: 10px; font-weight: bold; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #fff; }
    .toggle-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .toggle-btn { flex: 1; padding: 10px; border: 2px solid #0f3460; border-radius: 8px; background: transparent; color: #aaa; cursor: pointer; font-size: 0.9rem; }
    .toggle-btn.active { background: #e94560; border-color: #e94560; color: #fff; font-weight: bold; }
    .info-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: #aaa; margin-top: 8px; }
    .scan-card { background: #16213e; border-radius: 8px; padding: 12px; font-size: 0.85rem; border-left: 3px solid #e94560; }
    .scan-card span { color: #e94560; font-weight: bold; }
  </style>
</head>
<body>
<header>
  <h1>Control de Asistencia</h1>
  <p>Escanea el QR para registrar tu asistencia</p>
</header>
<div class="container">
  <div class="toggle-row" style="margin-top:16px;">
    <button class="toggle-btn active" id="btn-entrada" onclick="setTipo('entrada')">Entrada</button>
    <button class="toggle-btn" id="btn-salida" onclick="setTipo('salida')">Salida</button>
  </div>
  <div id="reader"></div>
  <div class="info-row">
    <span id="geo-status">Obteniendo ubicacion...</span>
    <span id="hora-actual"></span>
  </div>
  <div id="status-msg" class="status-box"></div>
  <button class="btn btn-secondary" id="btn-reiniciar" onclick="reiniciarScanner()" style="display:none;">Escanear otro</button>
  <div id="last-scan" style="display:none;">
    <h3 style="color:#aaa;margin:16px 0 8px;">Ultimo registro:</h3>
    <div class="scan-card" id="scan-card-content"></div>
  </div>
  <br>
  <a href="Admin.html"><button class="btn btn-secondary">Panel Administrador</button></a>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, getDocs, Timestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDHbW-E4T9X4oDYDMB5aqUjn-FHIPXTi54",
    authDomain: "control-asistencia-5a248.firebaseapp.com",
    projectId: "control-asistencia-5a248",
    storageBucket: "control-asistencia-5a248.firebasestorage.app",
    messagingSenderId: "220664180281",
    appId: "1:220664180281:web:37820f1b3e0259883f67e8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let tipoRegistro = 'entrada';
  let escaneando = true;
  let latitud = null, longitud = null;
  let html5QrCode = null;

  setInterval(() => {
    document.getElementById('hora-actual').textContent = new Date().toLocaleTimeString('es-MX');
  }, 1000);

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(pos => {
      latitud = pos.coords.latitude;
      longitud = pos.coords.longitude;
      document.getElementById('geo-status').textContent = 'Ubicacion lista';
    }, () => {
      document.getElementById('geo-status').textContent = 'Sin ubicacion';
    });
  }

  window.setTipo = function(tipo) {
    tipoRegistro = tipo;
    document.getElementById('btn-entrada').classList.toggle('active', tipo === 'entrada');
    document.getElementById('btn-salida').classList.toggle('active', tipo === 'salida');
  };

  window.reiniciarScanner = function() {
    escaneando = true;
    document.getElementById('status-msg').className = 'status-box';
    document.getElementById('btn-reiniciar').style.display = 'none';
    iniciarScanner();
  };

  async function onScanSuccess(decodedText) {
    if (!escaneando) return;
    escaneando = false;
    if (html5QrCode) await html5QrCode.stop().catch(() => {});
    document.getElementById('status-msg').textContent = 'Registrando...';
    document.getElementById('status-msg').className = 'status-box info';
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const q = query(collection(db, 'asistencia'), where('id_persona', '==', decodedText), where('tipo', '==', tipoRegistro), where('fecha', '>=', Timestamp.fromDate(hoy)));
    const snap = await getDocs(q);
    if (!snap.empty) {
      document.getElementById('status-msg').textContent = 'Ya registraste ' + tipoRegistro + ' hoy';
      document.getElementById('status-msg').className = 'status-box error';
      document.getElementById('btn-reiniciar').style.display = 'block';
      return;
    }
    try {
      await addDoc(collection(db, 'asistencia'), {
        id_persona: decodedText, tipo: tipoRegistro,
        fecha: Timestamp.now(), latitud: latitud, longitud: longitud,
        hora: new Date().toLocaleTimeString('es-MX')
      });
      document.getElementById('status-msg').textContent = tipoRegistro.toUpperCase() + ' registrada correctamente';
      document.getElementById('status-msg').className = 'status-box success';
      document.getElementById('last-scan').style.display = 'block';
      document.getElementById('scan-card-content').innerHTML = 'ID: <span>' + decodedText + '</span><br>Tipo: <span>' + tipoRegistro + '</span><br>Hora: <span>' + new Date().toLocaleTimeString('es-MX') + '</span>';
    } catch(e) {
      document.getElementById('status-msg').textContent = 'Error al guardar. Intenta de nuevo.';
      document.getElementById('status-msg').className = 'status-box error';
    }
    document.getElementById('btn-reiniciar').style.display = 'block';
  }

  function iniciarScanner() {
    document.getElementById('reader').innerHTML = '';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess)
    .catch(err => {
      document.getElementById('status-msg').textContent = 'No se pudo acceder a la camara';
      document.getElementById('status-msg').className = 'status-box error';
    });
  }

  iniciarScanner();
</script>
</body>
</html>
