<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Salida</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #4f1a0d; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; color: #000; border-radius: 16px; padding: 30px 24px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    h1 { color: #4f1a0d; font-size: 1.6rem; margin-bottom: 6px; }
    .badge { background: #4f1a0d; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; display: inline-block; margin-bottom: 20px; }
    input { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; margin-bottom: 16px; outline: none; }
    input:focus { border-color: #4f1a0d; }
    button { width: 100%; padding: 16px; background: #4f1a0d; color: #fff; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 0.95rem; display: none; }
    .msg.success { background: #fde8e8; color: #4f1a0d; border: 1px solid #4f1a0d; display: block; }
    .msg.error { background: #fde8e8; color: #c0392b; border: 1px solid #c0392b; display: block; }
    .geo { font-size: 0.8rem; color: #888; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Registro de</h1>
  <div class="badge">SALIDA</div>
  <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">Escribe tu nombre completo</p>
  <input type="text" id="nombre" placeholder="Tu nombre completo..."/>
  <p class="geo" id="geo-status">Obteniendo ubicacion...</p>
  <button id="btn" onclick="registrar()">Registrar Salida</button>
  <div class="msg" id="msg"></div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, getDocs, Timestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDHbW-E4T9X4oDYDMB5aqUjn-FHIPXTi54",
    authDomain: "control-asistencia-5a248.firebaseapp.com",
    projectId: "control-asistencia-5a248",
    storageBucket: "control-asistencia-5a248.firebasestorage.app",
    messagingSenderId: "220664180281",
    appId: "1:220664180281:web:37820f1b3e0259883f67e8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let latitud = null, longitud = null;
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      latitud = pos.coords.latitude;
      longitud = pos.coords.longitude;
      document.getElementById('geo-status').textContent = 'Ubicacion lista';
    }, () => {
      document.getElementById('geo-status').textContent = 'Sin ubicacion';
    });
  }
  window.registrar = async function() {
    const nombre = document.getElementById('nombre').value.trim();
    if (!nombre) {
      document.getElementById('msg').textContent = 'Por favor escribe tu nombre.';
      document.getElementById('msg').className = 'msg error';
      return;
    }
    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Registrando...';
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const q = query(collection(db, 'asistencia'), where('nombre', '==', nombre), where('tipo', '==', 'salida'), where('fecha', '>=', Timestamp.fromDate(hoy)));
    const snap = await getDocs(q);
    if (!snap.empty) {
      document.getElementById('msg').textContent = 'Ya registraste tu salida hoy.';
      document.getElementById('msg').className = 'msg error';
      btn.disabled = false; btn.textContent = 'Registrar Salida'; return;
    }
    try {
      await addDoc(collection(db, 'asistencia'), {
        nombre: nombre, tipo: 'salida', fecha: Timestamp.now(),
        hora: new Date().toLocaleTimeString('es-MX'), latitud: latitud, longitud: longitud
      });
      document.getElementById('msg').textContent = 'Salida registrada. Hasta pronto ' + nombre + '!';
      document.getElementById('msg').className = 'msg success';
      document.getElementById('nombre').value = '';
      btn.disabled = false; btn.textContent = 'Registrar Salida';
    } catch(e) {
      document.getElementById('msg').textContent = 'Error. Intenta de nuevo.';
      document.getElementById('msg').className = 'msg error';
      btn.disabled = false; btn.textContent = 'Registrar Salida';
    }
  };
</script>
</body>
</html>
